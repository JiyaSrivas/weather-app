<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>

<div class="card">

    <!-- SEARCH -->
    <div class="research">
        <input type="text" placeholder="Enter city name" spellcheck="false">
        <button>🔍</button>
    </div>

    <!-- ERROR -->
    <div class="error">
        <p>Invalid City Name</p>
    </div>

    <!-- WEATHER DATA (HIDDEN INITIALLY) -->
    <div class="weather">

        <!-- CITY -->
        <p class="city"></p>

        <!-- ICON -->
        <img src="" class="weather-icon" alt="weather icon">

        <!-- CONDITION -->
        <p class="condition"></p>

        <!-- TEMP -->
        <h1 class="temp"></h1>

        <!-- CLOCK -->
       <p class="clock"></p>

<!-- BOTTOM DETAILS -->
<div class="bottom">
    <div>
        <p class="humidity"></p>
        <span>Humidity</span>
    </div>

    <div>
        <p class="wind"></p>
        <span>Wind</span>
    </div>

    <div>
        <p class="feels-like"></p>
        <span>Feels Like</span>
    </div>

    <div>
        <p class="pressure"></p>
        <span>Pressure</span>
        
    </div>
</div>

</div>

<script>

    document.body.classList.toggle("dark");
const apiKey = "260c770b21e717e030b4c90521f7b855";
const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

const searchBox = document.querySelector(".research input");
const searchBtn = document.querySelector(".research button");
const weatherIcon = document.querySelector(".weather-icon");

// HIDE INITIALLY
document.querySelector(".weather").style.display = "none";
document.querySelector(".error").style.display = "none";

async function checkWeather(city) {

    

    if (!city) {
        alert("Please enter city name");
        return;
    }

    const response = await fetch(apiUrl + city + `&appid=${apiKey}`);

    if (response.status == 404) {
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
    } else {
    const data = await response.json();

    document.querySelector(".city").innerHTML = data.name;
    document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
    document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
    document.querySelector(".wind").innerHTML = Math.round(data.wind.speed) + " km/hr";
    document.querySelector(".condition").innerHTML = data.weather[0].main;


    let timezoneOffset = data.timezone; 

// clear previous interval (important)
if (window.clockInterval) {
    clearInterval(window.clockInterval);
}

// start new city clock
window.clockInterval = setInterval(() => {
    const utc = new Date().getTime() + (new Date().getTimezoneOffset() * 60000);
    const cityTime = new Date(utc + (timezoneOffset * 1000));

    document.querySelector(".clock").innerHTML =
        cityTime.toLocaleTimeString();
}, 1000);


    // ✅ NEW (correct place)
    document.querySelector(".feels-like").innerHTML =
        Math.round(data.main.feels_like) + "°C";

    document.querySelector(".pressure").innerHTML =
        data.main.pressure + " hPa";

    // ICON
    if (data.weather[0].main == "Clouds") {
        weatherIcon.src = "cloudy.jpeg";
    } else if (data.weather[0].main == "Rain") {
        weatherIcon.src = "rainy.jpeg";
    } else if (data.weather[0].main == "Clear") {
        weatherIcon.src = "clear.jpeg";
    } else if (data.weather[0].main == "Mist") {
        weatherIcon.src = "mist.jpeg";
    } else {
        weatherIcon.src = "cloudy.jpeg";
    }

    
    const utc = new Date().getTime() + (new Date().getTimezoneOffset() * 60000);
    const localTime = new Date(utc + (data.timezone * 1000));

   

    document.querySelector(".weather").style.display = "block";
    document.querySelector(".error").style.display = "none";
    document.querySelector(".loading").style.display = "block";
}
}



// CLICK
searchBtn.addEventListener("click", () => {
    checkWeather(searchBox.value.trim());
});

// ENTER KEY
searchBox.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        checkWeather(searchBox.value.trim());
    }
});





</script>

</body>
</html>
